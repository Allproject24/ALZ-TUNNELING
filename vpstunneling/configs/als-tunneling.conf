# AL STORE TUNNELING - Internal Proxy Protocol Servers
# Digunakan oleh nginx stream routing (Phase 2+)
#
# Arsitektur (Potato-style):
#   Port 80/443 → nginx stream (SNI routing) →
#     :2905  = WS + HTTPUpgrade (publicagent style)
#     :9605  = gRPC (bdsm style, HTTP/2)
#     :2996  = SSH WebSocket
#
# Xray inbounds (semua 127.0.0.1):
#   WS         : vmess:10001  vless:10002  trojan:10003
#   gRPC       : vmess:10011  vless:10012  trojan:10013
#   HTTPUpgrade: vmess:10021  vless:10022  trojan:10023
#   SSH        : websockify:1230

# ═══════════ WS + HTTPUpgrade :2905 ═══════════
server {
    listen 127.0.0.1:2905 proxy_protocol so_keepalive=on reuseport;
    server_name _;
    set_real_ip_from 127.0.0.1;
    real_ip_header   proxy_protocol;

    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;
    proxy_socket_keepalive  on;

    # VMess WebSocket
    location /vmess {
        proxy_pass http://127.0.0.1:10001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # VMess HTTPUpgrade
    location /upvmess {
        proxy_pass http://127.0.0.1:10021;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # VLESS WebSocket
    location /vless {
        proxy_pass http://127.0.0.1:10002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # VLESS HTTPUpgrade
    location /upvless {
        proxy_pass http://127.0.0.1:10022;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # Trojan WebSocket
    location /trojan {
        proxy_pass http://127.0.0.1:10003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # Trojan HTTPUpgrade
    location /uptrojan {
        proxy_pass http://127.0.0.1:10023;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    # SSH WebSocket
    location /ssh {
        proxy_pass http://127.0.0.1:1230;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location /worryfree {
        proxy_pass http://127.0.0.1:1230;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location /kuota-habis/ {
        proxy_pass http://127.0.0.1:1230;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_set_header X-Forwarded-For $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location / {
        default_type text/plain;
        return 200 "AL STORE TUNNELING";
    }
}

# ═══════════ gRPC :9605 ═══════════
server {
    listen 127.0.0.1:9605 http2 proxy_protocol so_keepalive=on reuseport;
    server_name _;
    set_real_ip_from 127.0.0.1;
    real_ip_header   proxy_protocol;

    location /vmess {
        grpc_pass grpc://127.0.0.1:10011;
        grpc_set_header X-Real-IP $proxy_protocol_addr;
        grpc_read_timeout 86400s;
        grpc_send_timeout 86400s;
    }
    location /vless {
        grpc_pass grpc://127.0.0.1:10012;
        grpc_set_header X-Real-IP $proxy_protocol_addr;
        grpc_read_timeout 86400s;
        grpc_send_timeout 86400s;
    }
    location /trojan {
        grpc_pass grpc://127.0.0.1:10013;
        grpc_set_header X-Real-IP $proxy_protocol_addr;
        grpc_read_timeout 86400s;
        grpc_send_timeout 86400s;
    }
}

# ═══════════ SSH WS Fallback :2996 ═══════════
server {
    listen 127.0.0.1:2996 proxy_protocol so_keepalive=on;
    server_name _;
    set_real_ip_from 127.0.0.1;
    real_ip_header   proxy_protocol;

    location / {
        proxy_pass http://127.0.0.1:1230;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $proxy_protocol_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ═══════════ Default :8081 ═══════════
server {
    listen 8081 default_server;
    server_name _;
    add_header Content-Type text/plain;
    return 200 "AL STORE TUNNELING";
}
