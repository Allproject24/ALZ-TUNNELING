# AL STORE TUNNELING - Nginx v2.2
# Port 443 + 8443: HTTPS/TLS  (ssl_stapling, server_tokens off)
# Port 80, 8080, 2052, 2053, 8880: HTTP

upstream xray_vmess_ws   { server 127.0.0.1:10001; keepalive 128; }
upstream xray_vmess_grpc { server 127.0.0.1:10011; keepalive 128; }
upstream xray_vmess_up   { server 127.0.0.1:10021; keepalive 128; }
upstream xray_vless_ws   { server 127.0.0.1:10002; keepalive 128; }
upstream xray_vless_grpc { server 127.0.0.1:10012; keepalive 128; }
upstream xray_vless_up   { server 127.0.0.1:10022; keepalive 128; }
upstream xray_trojan_ws  { server 127.0.0.1:10003; keepalive 128; }
upstream xray_trojan_grpc{ server 127.0.0.1:10013; keepalive 128; }
upstream xray_trojan_up  { server 127.0.0.1:10023; keepalive 128; }
upstream websockify_ssh  { server 127.0.0.1:1230;  keepalive 32;  }

server {
    listen 80;
    listen 8080;
    listen 2052;
    listen 2053;
    listen 8880;
    server_name _;
    server_tokens off;

    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;
    proxy_socket_keepalive  on;
    proxy_connect_timeout   5s;

    location /vmess   { proxy_pass http://xray_vmess_ws;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /vmess/  { grpc_pass grpc://xray_vmess_grpc;  grpc_read_timeout 86400s; grpc_send_timeout 86400s; }
    location /upvmess { proxy_pass http://xray_vmess_up;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /vless   { proxy_pass http://xray_vless_ws;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /vless/  { grpc_pass grpc://xray_vless_grpc;  grpc_read_timeout 86400s; grpc_send_timeout 86400s; }
    location /upvless { proxy_pass http://xray_vless_up;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /trojan  { proxy_pass http://xray_trojan_ws;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /trojan/ { grpc_pass grpc://xray_trojan_grpc; grpc_read_timeout 86400s; grpc_send_timeout 86400s; }
    location /uptrojan{ proxy_pass http://xray_trojan_up;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /ssh        { proxy_pass http://websockify_ssh;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /worryfree  { proxy_pass http://websockify_ssh;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /kuota-habis/ { proxy_pass http://websockify_ssh; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location / { default_type text/plain; return 200 "AL STORE TUNNELING"; }
}

server {
    listen 443 ssl;
    listen 8443 ssl;
    server_name _;
    server_tokens off;

    ssl_certificate         /etc/ssl/xray/cert.pem;
    ssl_certificate_key     /etc/ssl/xray/key.pem;
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers             ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:ECDHE-ECDSA-AES256-GCM-SHA384;
    ssl_session_cache       shared:SSL:20m;
    ssl_session_timeout     1d;
    ssl_session_tickets     on;

    # OCSP Stapling — skip OCSP check saat handshake (~100-300ms hemat per koneksi baru)
    ssl_stapling            on;
    ssl_stapling_verify     on;
    resolver                8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout        3s;

    proxy_buffering         off;
    proxy_request_buffering off;
    proxy_cache             off;
    proxy_socket_keepalive  on;
    proxy_connect_timeout   5s;

    location /vmess   { proxy_pass http://xray_vmess_ws;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /vmess/  { grpc_pass grpc://xray_vmess_grpc;  grpc_read_timeout 86400s; grpc_send_timeout 86400s; }
    location /upvmess { proxy_pass http://xray_vmess_up;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /vless   { proxy_pass http://xray_vless_ws;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /vless/  { grpc_pass grpc://xray_vless_grpc;  grpc_read_timeout 86400s; grpc_send_timeout 86400s; }
    location /upvless { proxy_pass http://xray_vless_up;   proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /trojan  { proxy_pass http://xray_trojan_ws;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /trojan/ { grpc_pass grpc://xray_trojan_grpc; grpc_read_timeout 86400s; grpc_send_timeout 86400s; }
    location /uptrojan{ proxy_pass http://xray_trojan_up;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /ssh        { proxy_pass http://websockify_ssh;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /worryfree  { proxy_pass http://websockify_ssh;  proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location /kuota-habis/ { proxy_pass http://websockify_ssh; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_set_header Host $http_host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 86400s; proxy_send_timeout 86400s; }
    location / { default_type text/plain; return 200 "AL STORE TUNNELING"; }
}
